<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Formulario de Contacto Moderno</title>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Poppins', sans-serif;
		}

		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
			padding: 20px;
		}

		.container {
			width: 100%;
			max-width: 800px;
			background: rgba(255, 255, 255, 0.05);
			backdrop-filter: blur(15px);
			-webkit-backdrop-filter: blur(15px);
			border-top: 1px solid rgba(255, 255, 255, 0.2);
			border-left: 1px solid rgba(255, 255, 255, 0.2);
			border-radius: 20px;
			box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
			padding: 40px;
			color: #fff;
			display: flex;
			flex-direction: column;
			gap: 20px;
		}

		.header {
			text-align: center;
			margin-bottom: 20px;
		}

		.header h1 {
			font-size: 36px;
			font-weight: 600;
			margin-bottom: 10px;
			background: linear-gradient(to right, #00c6ff, #0072ff);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.header p {
			font-size: 16px;
			font-weight: 300;
			color: #ccc;
		}

		.form-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
		}

		.input-group {
			display: flex;
			flex-direction: column;
		}

		.input-group.full-width {
			grid-column: span 2;
		}

		.input-group label {
			font-size: 14px;
			margin-bottom: 8px;
			color: #eee;
			font-weight: 500;
			letter-spacing: 0.5px;
		}

		.input-group input,
		.input-group textarea {
			width: 100%;
			padding: 15px;
			background: rgba(255, 255, 255, 0.05);
			border: 1px solid rgba(255, 255, 255, 0.1);
			border-radius: 10px;
			color: #fff;
			font-size: 15px;
			outline: none;
			transition: all 0.3s ease;
		}

		.input-group input::placeholder,
		.input-group textarea::placeholder {
			color: rgba(255, 255, 255, 0.5);
		}

		.input-group input:focus,
		.input-group textarea:focus {
			background: rgba(255, 255, 255, 0.1);
			border-color: #00c6ff;
			box-shadow: 0 0 10px rgba(0, 198, 255, 0.2);
		}

		.input-group textarea {
			resize: vertical;
			min-height: 120px;
		}

		.btn-container {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-top: 20px;
			grid-column: span 2;
		}

		.btn {
			padding: 15px 30px;
			border-radius: 30px;
			border: none;
			cursor: pointer;
			font-size: 16px;
			font-weight: 600;
			transition: all 0.3s ease;
			text-transform: uppercase;
			letter-spacing: 1px;
			text-decoration: none;
		}

		.btn-submit {
			background: linear-gradient(to right, #00c6ff, #0072ff);
			color: white;
			box-shadow: 0 5px 15px rgba(0, 114, 255, 0.3);
			flex: 1;
			margin-left: 15px;
			text-align: center;
		}

		.btn-submit:hover {
			transform: translateY(-3px);
			box-shadow: 0 8px 20px rgba(0, 114, 255, 0.5);
		}

		.btn-back {
			background: rgba(255, 255, 255, 0.1);
			color: #fff;
			border: 1px solid rgba(255, 255, 255, 0.2);
			text-align: center;
		}

		.btn-back:hover {
			background: rgba(255, 255, 255, 0.2);
			transform: translateY(-3px);
		}

		@media (max-width: 600px) {
			.form-grid {
				grid-template-columns: 1fr;
			}

			.input-group.full-width {
				grid-column: span 1;
			}

			.btn-container {
				flex-direction: column-reverse;
				gap: 15px;
				grid-column: span 1;
			}

			.btn {
				width: 100%;
				margin-left: 0;
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="header">
			<h1>Contáctenos</h1>
			<p>Su opinión nos importa. Déjenos un mensaje.</p>
		</div>

		<form class="form-grid" action="#" method="POST"
			onsubmit="event.preventDefault(); alert('¡Mensaje enviado correctamente!');">
			<div class="input-group full-width">
				<label for="nombre">Nombre Completo</label>
				<input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
			</div>

			<div class="input-group">
				<label for="correo">Correo Electrónico</label>
				<input type="email" id="correo" placeholder="correo@ejemplo.com" required>
			</div>

			<div class="input-group">
				<label for="numero">Número de Teléfono</label>
				<input type="tel" id="numero" placeholder="+1 234 567 890" required>
			</div>

			<div class="input-group full-width">
				<label for="mensaje">Su Mensaje</label>
				<textarea id="mensaje" placeholder="Escriba su mensaje aquí..." required></textarea>
			</div>

			<div class="btn-container">
				<a href="ejemplo.html" class="btn btn-back">Volver Atrás</a>
				<button type="submit" class="btn btn-submit">Enviar Mensaje</button>
			</div>
		</form>
	</div>
</body>

</html>
