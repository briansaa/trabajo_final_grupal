<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Moderno - Diseño UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #0f172a;
      --surface: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
    }

    .hero {
      text-align: center;
      z-index: 10;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    .open-modal-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .open-modal-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.6);
    }

    .nav-link {
      display: inline-block;
      margin-top: 30px;
      color: var(--text-muted);
      text-decoration: none;
      padding-bottom: 2px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.4);
      transition: all 0.3s ease;
    }

    .nav-link:hover {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      width: 90%;
      max-width: 480px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: scale(0.95) translateY(20px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .modal-icon {
      width: 64px;
      height: 64px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--primary);
    }

    .modal-icon svg {
      width: 32px;
      height: 32px;
    }

    .modal-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-body {
      text-align: center;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .btn-cancel {
      background: transparent;
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .btn-confirm {
      background: var(--primary);
      color: white;
      border: none;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-confirm:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Diseño de Interfaz</h1>
    <p>Una experiencia moderna con efectos de cristal y animaciones fluidas.</p>
    <button class="open-modal-btn" id="openModal">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122">
        </path>
      </svg>
      Abrir Modal
    </button>
    <br>
    <a href="formulario.html" class="nav-link">Ir al Formulario de Contacto</a>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <div class="modal-header">
        <h2 class="modal-title">¡Acción Completada!</h2>
      </div>
      <div class="modal-body">
        <p>Este es un ejemplo de una ventana modal moderna, con temas oscuros, resaltados vibrantes y tipografía
          refinada (Outfit).</p>
      </div>
      <div class="modal-footer">
        <button class="modal-btn btn-cancel" id="closeModal">Cancelar</button>
        <button class="modal-btn btn-confirm" id="confirmModal">Aceptar</button>
      </div>
    </div>
  </div>

  <script>
    const modalOverlay = document.getElementById('modalOverlay');
    const openModalBtn = document.getElementById('openModal');
    const closeModalBtn = document.getElementById('closeModal');
    const confirmModalBtn = document.getElementById('confirmModal');

    function openModal() {
      modalOverlay.classList.add('active');
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
    }

    openModalBtn.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);
    confirmModalBtn.addEventListener('click', closeModal);

    // Close on overlay click
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) {
        closeModal();
      }
    });
  </script>
</body>

</html>
